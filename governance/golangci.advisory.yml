version: "2"

run:
  tests: false

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - funlen
    - gocyclo
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    funlen:
      lines: 70
      statements: 45
    gocyclo:
      min-complexity: 24

formatters:
  enable: []

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
