version: "2"

run:
  tests: false

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - funlen
    - gocyclo
    - bodyclose

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters-settings:
  funlen:
    lines: 70
    statements: 45
  gocyclo:
    min-complexity: 24
  errcheck:
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - (*bytes.Buffer).Write
      - (*strings.Builder).WriteString
